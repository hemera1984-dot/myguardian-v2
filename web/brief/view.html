<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>브리핑 - 마이가디언</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="brief.css">
  <script src="../assets/vendor/pdfjs/pdf.min.js"></script>
  <script src="brief.js"></script>
</head>
<body class="brief-view">
  <div class="vw-stage-wrap stage-wrap" id="stage-wrap" hidden>
    <div class="stage" id="stage">
      <div id="page-slot"></div>
      <div class="pointer-dot" id="pointer"></div>
    </div>
  </div>
  <div class="vw-wait" id="wait">
    <div>
      <strong>발표자 화면 연결 대기 중</strong>
      발표자 화면에서 "청중 화면 열기"로 연 창인지 확인해주세요.
    </div>
  </div>

  <script>
    (function () {
      "use strict";
      var B = window.mgBrief;
      var params = new URLSearchParams(window.location.search);

      var driver = null;
      var current = 0;
      var renderSeq = 0;
      var protocol = null;
      var pendingState = null; // 자료 준비 전에 도착한 상태 (준비 후 적용)
      var frameWin = null;     // HTML 자료 iframe (스크롤 적용용)

      var stageWrap = document.getElementById("stage-wrap");
      var stage = document.getElementById("stage");
      var slot = document.getElementById("page-slot");
      var pointer = document.getElementById("pointer");

      function show(n) {
        if (!driver) return;
        n = Math.max(1, Math.min(driver.count, Math.round(n)));
        if (n === current) return;
        current = n;
        var seq = ++renderSeq;
        driver.mount(slot, n).then(function (frame) {
          if (seq !== renderSeq) return;
          stage.dataset.page = String(n);
          if (frame) frameWin = frame.contentWindow;
          pointer.classList.remove("on");
          B.scaleStage(stageWrap, stage);
        }).catch(function () {});
      }

      function applyVideo(action, time) {
        var v = stage.querySelector("video");
        if (!v) return;
        if (typeof time === "number" && Math.abs((v.currentTime || 0) - time) > 0.5) {
          try { v.currentTime = time; } catch (err) { /* 메타데이터 로드 전 탐색은 무시 */ }
        }
        if (action === "play") v.play().catch(function () {});
        if (action === "pause") v.pause();
      }

      function applyScroll(y) {
        if (!frameWin) return;
        try {
          var el = frameWin.document.scrollingElement || frameWin.document.documentElement;
          var range = el.scrollHeight - el.clientHeight;
          frameWin.scrollTo(0, y * Math.max(0, range));
        } catch (err) { /* 접근 불가 시 무시 */ }
      }

      function ready(d) {
        if (driver) return;
        driver = d;
        document.title = driver.title + " - 마이가디언";
        document.getElementById("wait").hidden = true;
        stageWrap.hidden = false;
        show(pendingState ? pendingState.page : 1);
        if (pendingState) {
          if (pendingState.video) applyVideo(pendingState.video.playing ? "play" : "pause", pendingState.video.time);
          if (typeof pendingState.scroll === "number") applyScroll(pendingState.scroll);
        }
        pendingState = null;
      }

      function showError(err) {
        var wait = document.getElementById("wait");
        wait.querySelector("strong").textContent = "문서를 열 수 없습니다.";
        wait.querySelector("div").lastChild.textContent = err && err.message ? err.message : String(err);
      }

      function connect(id) {
        var transport = B.createBroadcastTransport(B.channelName(id));
        protocol = B.createProtocol(transport, {
          page: function (msg) {
            if (!driver) { pendingState = { page: msg.page }; return; }
            show(msg.page);
          },
          state: function (msg) {
            if (!driver) { pendingState = msg; return; }
            show(msg.page);
            if (msg.video) applyVideo(msg.video.playing ? "play" : "pause", msg.video.time);
            if (typeof msg.scroll === "number") applyScroll(msg.scroll);
          },
          pointer: function (msg) {
            if (!msg.on) {
              pointer.classList.remove("on");
              return;
            }
            pointer.style.left = (msg.x * 100) + "%";
            pointer.style.top = (msg.y * 100) + "%";
            pointer.classList.add("on");
          },
          video: function (msg) { applyVideo(msg.action, msg.time); },
          scroll: function (msg) { applyScroll(msg.y); }
        });

        // 발표자보다 먼저 열렸으면 최초 hello가 유실된다 — 준비될 때까지 재요청
        protocol.sendHello();
        var helloTimer = setInterval(function () {
          if (driver) {
            clearInterval(helloTimer);
            return;
          }
          protocol.sendHello();
        }, 1200);
        window.addEventListener("beforeunload", function () { transport.close(); });
      }

      function bootDoc(promise) {
        promise.then(function (d) {
          return B.createDriver({ kind: "doc", id: d.id, doc: d }, { audience: true });
        }).then(ready).catch(showError);
      }

      // 자료 경로: ?doc=<공개id> / ?src=<저장소 상대경로> / ?local=1&ch=<자료id>
      // 로컬 자료(JSON·PDF·HTML·이미지)는 같은 기기의 IndexedDB 슬롯에서 직접 읽는다 —
      // 자료 내용이 채널에 실리지 않는다. 발표자가 새 자료를 저장할 때까지 재시도한다.
      var channelId = params.get("doc") || params.get("ch");
      if (params.get("src")) {
        B.loadDocBySrc(params.get("src")).then(function (d) {
          connect(d.id);
          return B.createDriver({ kind: "doc", id: d.id, doc: d }, { audience: true });
        }).then(ready).catch(showError);
      } else if (channelId && /^[a-z][a-z0-9-]*$/.test(channelId)) {
        var isLocal = !params.get("doc");
        connect(channelId);
        if (!isLocal) {
          bootDoc(B.loadDocById(channelId));
        } else {
          var tryLoad = function () {
            if (driver) return;
            B.loadMaterial().then(function (record) {
              if (driver || !record || record.id !== channelId) return;
              return B.createDriver(record, { audience: true }).then(ready);
            }).catch(function () {});
          };
          tryLoad();
          var loadTimer = setInterval(function () {
            if (driver) {
              clearInterval(loadTimer);
              return;
            }
            tryLoad();
          }, 1200);
        }
      } else {
        showError(new Error("문서가 지정되지 않았습니다."));
      }

      // 전체화면: F 키 또는 더블클릭
      function toggleFullscreen() {
        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else {
          document.documentElement.requestFullscreen().catch(function () {});
        }
      }
      document.addEventListener("keydown", function (e) {
        if (e.key === "f" || e.key === "F") toggleFullscreen();
      });
      document.addEventListener("dblclick", toggleFullscreen);

      window.addEventListener("resize", function () { B.scaleStage(stageWrap, stage); });
    })();
  </script>
</body>
</html>
