<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>브리핑 - 마이가디언</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="brief.css">
  <script src="brief.js"></script>
</head>
<body class="brief-view">
  <div class="vw-stage-wrap stage-wrap" id="stage-wrap" hidden>
    <div class="stage" id="stage">
      <div id="page-slot"></div>
      <div class="pointer-dot" id="pointer"></div>
    </div>
  </div>
  <div class="vw-wait" id="wait">
    <div>
      <strong>발표자 화면 연결 대기 중</strong>
      발표자 화면에서 "청중 화면 열기"로 연 창인지 확인해주세요.
    </div>
  </div>

  <script>
    (function () {
      "use strict";
      var B = window.mgBrief;
      var params = new URLSearchParams(window.location.search);

      var doc = null;
      var current = 0;
      var protocol = null;
      var pendingState = null; // 문서 로드 전에 도착한 상태 (로드 완료 후 적용)

      var stageWrap = document.getElementById("stage-wrap");
      var stage = document.getElementById("stage");
      var slot = document.getElementById("page-slot");
      var pointer = document.getElementById("pointer");

      function show(n) {
        if (!doc) return;
        var total = doc["페이지"].length;
        n = Math.max(1, Math.min(total, Math.round(n)));
        if (n === current) return;
        current = n;
        slot.textContent = "";
        slot.appendChild(B.renderPage(doc["페이지"][n - 1], { audience: true }));
        pointer.classList.remove("on");
        B.fitPage(stage);
        B.scaleStage(stageWrap, stage);
      }

      function applyVideo(action, time) {
        var v = stage.querySelector("video");
        if (!v) return;
        if (typeof time === "number" && Math.abs((v.currentTime || 0) - time) > 0.5) {
          try { v.currentTime = time; } catch (err) { /* 메타데이터 로드 전 탐색은 무시 */ }
        }
        if (action === "play") v.play().catch(function () {});
        if (action === "pause") v.pause();
      }

      function ready(d) {
        if (doc) return;
        doc = d;
        document.title = doc["제목"] + " - 마이가디언";
        document.getElementById("wait").hidden = true;
        stageWrap.hidden = false;
        show(pendingState ? pendingState.page : 1);
        if (pendingState && pendingState.video) {
          applyVideo(pendingState.video.playing ? "play" : "pause", pendingState.video.time);
        }
        pendingState = null;
      }

      // 발표자 창이 sessionStorage로 넘긴 로컬 문서가 window.open 복사본으로
      // 청중 창까지 따라온다 — 청중 창에는 필요 없으므로 즉시 지운다 (Codex 검수 반영)
      try { window.sessionStorage.removeItem("mg-brief-local"); } catch (err) { /* 무시 */ }

      // 문서 로드 경로: ?doc=<공개id> / ?src=<저장소 상대경로> / ?local=1&ch=<문서id>
      // 로컬 문서는 발표자 창이 doc 메시지로 문서 자체를 보내준다 (같은 기기 두 창 전용).
      // doc 메시지 수신은 로컬 모드에서만 연다 — 공개 문서를 위조 doc가 선점하지 못하게 (Codex 검수 반영)
      var channelId = params.get("doc") || params.get("ch");
      if (params.get("src")) {
        B.loadDocBySrc(params.get("src")).then(function (d) {
          connect(d.id, false);
          ready(d);
        }).catch(showError);
      } else if (channelId && /^[a-z][a-z0-9-]*$/.test(channelId)) {
        var isLocal = !params.get("doc");
        connect(channelId, isLocal);
        if (!isLocal) B.loadDocById(channelId).then(ready).catch(showError);
      } else {
        showError(new Error("문서가 지정되지 않았습니다."));
      }

      function showError(err) {
        var wait = document.getElementById("wait");
        wait.querySelector("strong").textContent = "문서를 열 수 없습니다.";
        wait.querySelector("div").lastChild.textContent = err.message;
      }

      function connect(id, allowDoc) {
        var transport = B.createBroadcastTransport(B.channelName(id));
        var handlers = {
          page: function (msg) {
            if (!doc) { pendingState = { page: msg.page }; return; }
            show(msg.page);
          },
          state: function (msg) {
            if (!doc) { pendingState = msg; return; }
            show(msg.page);
            if (msg.video) applyVideo(msg.video.playing ? "play" : "pause", msg.video.time);
          },
          pointer: function (msg) {
            if (!msg.on) {
              pointer.classList.remove("on");
              return;
            }
            pointer.style.left = (msg.x * 100) + "%";
            pointer.style.top = (msg.y * 100) + "%";
            pointer.classList.add("on");
          },
          video: function (msg) { applyVideo(msg.action, msg.time); }
        };
        if (allowDoc) handlers.doc = function (msg) { ready(msg.doc); };
        protocol = B.createProtocol(transport, handlers);

        // 발표자보다 먼저 열렸으면 최초 hello가 유실된다 — 문서를 받을 때까지
        // 재요청한다 (Codex 검수 반영: 로컬 청중 창 선개설 시 영구 대기 해소)
        protocol.sendHello();
        var helloTimer = setInterval(function () {
          if (doc) {
            clearInterval(helloTimer);
            return;
          }
          protocol.sendHello();
        }, 1200);
        window.addEventListener("beforeunload", function () { transport.close(); });
      }

      // 전체화면: F 키 또는 더블클릭
      function toggleFullscreen() {
        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else {
          document.documentElement.requestFullscreen().catch(function () {});
        }
      }
      document.addEventListener("keydown", function (e) {
        if (e.key === "f" || e.key === "F") toggleFullscreen();
      });
      document.addEventListener("dblclick", toggleFullscreen);

      window.addEventListener("resize", function () { B.scaleStage(stageWrap, stage); });
    })();
  </script>
</body>
</html>
