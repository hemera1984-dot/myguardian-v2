<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>발표자 화면 - 브리핑 - 마이가디언</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="brief.css">
  <script src="../assets/vendor/pdfjs/pdf.min.js"></script>
  <script src="brief.js"></script>
</head>
<body class="brief-present">
  <header class="pr-topbar" id="topbar" hidden>
    <span class="pr-mode" id="mode-badge"></span>
    <span class="pr-doc-title" id="doc-title"></span>
    <div class="pr-top-right">
      <button class="pr-timer" id="timer" type="button" title="누르면 0:00부터 다시 잽니다" aria-label="경과 시간, 누르면 초기화">0:00</button>
      <button class="pr-button" id="pointer-toggle" type="button" aria-pressed="true">포인터 송신</button>
      <button class="pr-button primary" id="open-view" type="button">청중 화면 열기</button>
    </div>
  </header>

  <main class="pr-main" id="main" hidden>
    <div class="pr-stage-col">
      <div class="pr-stage-wrap stage-wrap" id="stage-wrap">
        <div class="stage" id="stage"></div>
      </div>
      <p class="pr-hint" id="hint">새로 열린 청중 창을 빔프로젝터·확장 모니터로 끌어 놓고 F 키를 누르면 전체화면이 됩니다. 화면 클릭 또는 →/Space로 다음 페이지.</p>
    </div>
    <aside class="pr-side">
      <section class="pr-panel pr-script" aria-label="발표 스크립트">
        <p class="pr-panel-label">스크립트 — 청중 화면에는 표시되지 않습니다</p>
        <div class="pr-script-body" id="script-body"></div>
      </section>
      <section class="pr-panel pr-next" id="next-panel" aria-label="다음 페이지 미리보기">
        <p class="pr-panel-label">다음 페이지</p>
        <div class="pr-next-wrap stage-wrap" id="next-wrap">
          <div class="stage" id="next-stage"></div>
          <div class="pr-next-empty" id="next-empty" hidden>마지막 페이지입니다</div>
        </div>
      </section>
    </aside>
  </main>

  <nav class="pr-nav" id="nav" aria-label="페이지 이동" hidden>
    <button class="pr-button" id="prev" type="button" aria-label="이전 페이지">←</button>
    <div class="pr-nav-pages" id="nav-pages"></div>
    <button class="pr-button" id="next" type="button" aria-label="다음 페이지">→</button>
    <span class="pr-count" id="count"></span>
  </nav>

  <div class="pr-error" id="error" hidden>
    <strong>문서를 열 수 없습니다.</strong>
    <p id="error-msg"></p>
    <p><a href="./">브리핑 진입 화면으로 돌아가기</a></p>
  </div>

  <script>
    (function () {
      "use strict";
      var B = window.mgBrief;
      var params = new URLSearchParams(window.location.search);
      var isLocal = params.get("local") === "1";

      var driver = null;
      var channelId = null;
      var current = 1;
      var renderSeq = 0;
      var protocol = null;
      var transport = null;
      var pointerEnabled = true;
      var startedAt = Date.now();

      var stage = document.getElementById("stage");
      var stageWrap = document.getElementById("stage-wrap");
      var nextStage = document.getElementById("next-stage");
      var nextWrap = document.getElementById("next-wrap");

      function fail(message) {
        document.getElementById("error-msg").textContent = message;
        document.getElementById("error").hidden = false;
      }

      function videoEl() {
        return stage.querySelector("video");
      }

      function videoState() {
        var v = videoEl();
        if (!v) return null;
        return { playing: !v.paused && !v.ended, time: v.currentTime || 0 };
      }

      function bindVideo() {
        var v = videoEl();
        if (!v) return;
        v.addEventListener("play", function () { protocol.sendVideo("play", v.currentTime || 0); });
        v.addEventListener("pause", function () { protocol.sendVideo("pause", v.currentTime || 0); });
        v.addEventListener("seeked", function () { protocol.sendVideo("seek", v.currentTime || 0); });
      }

      // HTML 자료: iframe 스크롤을 비율로 송신
      var frameWin = null;
      function scrollRatio() {
        if (!frameWin) return undefined;
        try {
          var el = frameWin.document.scrollingElement || frameWin.document.documentElement;
          var range = el.scrollHeight - el.clientHeight;
          return range > 0 ? Math.min(1, Math.max(0, el.scrollTop / range)) : 0;
        } catch (err) {
          return undefined;
        }
      }

      var lastScrollSent = 0;
      function bindFrameScroll(frame) {
        frameWin = frame.contentWindow;
        try {
          frameWin.addEventListener("scroll", function () {
            var now = Date.now();
            if (now - lastScrollSent < 60) return;
            lastScrollSent = now;
            var y = scrollRatio();
            if (typeof y === "number") protocol.sendScroll(y);
          });
        } catch (err) { /* 접근 불가 시 스크롤 동기화 생략 */ }
      }

      function updateNav() {
        document.querySelectorAll(".pr-page-btn").forEach(function (b) {
          b.classList.toggle("active", Number(b.dataset.page) === current);
        });
        var active = document.querySelector(".pr-page-btn.active");
        if (active && active.scrollIntoView) active.scrollIntoView({ block: "nearest", inline: "nearest" });
        document.getElementById("count").textContent = current + " / " + driver.count;
      }

      function updateScript() {
        var scriptBody = document.getElementById("script-body");
        var text = driver.scriptFor(current);
        if (text) {
          scriptBody.textContent = text;
          scriptBody.classList.remove("empty");
        } else {
          scriptBody.textContent = "이 페이지의 스크립트가 없습니다.";
          scriptBody.classList.add("empty");
        }
      }

      function goTo(n, silent) {
        n = Math.max(1, Math.min(driver.count, Math.round(n)));
        current = n;
        var seq = ++renderSeq;
        driver.mount(stage, n).then(function (frame) {
          if (seq !== renderSeq) return;
          stage.dataset.page = String(n);
          B.scaleStage(stageWrap, stage);
          bindVideo();
          if (frame) bindFrameScroll(frame);
        }).catch(function () {});

        updateScript();

        var hasNext = n < driver.count;
        document.getElementById("next-empty").hidden = hasNext;
        if (hasNext) {
          driver.mount(nextStage, n + 1).then(function () {
            if (seq !== renderSeq) return;
            B.scaleStage(nextWrap, nextStage);
          }).catch(function () {});
        } else {
          nextStage.textContent = "";
        }

        updateNav();
        if (!silent) protocol.sendPage(current);
      }

      function buildNav() {
        var box = document.getElementById("nav-pages");
        for (var i = 1; i <= driver.count; i += 1) {
          (function (n) {
            var b = document.createElement("button");
            b.type = "button";
            b.className = "pr-page-btn";
            b.dataset.page = String(n);
            b.textContent = String(n);
            b.addEventListener("click", function () { goTo(n); });
            box.appendChild(b);
          })(i);
        }
        document.getElementById("prev").addEventListener("click", function () { goTo(current - 1); });
        document.getElementById("next").addEventListener("click", function () { goTo(current + 1); });
      }

      function viewUrl() {
        if (isLocal) return "view.html?local=1&ch=" + encodeURIComponent(channelId);
        if (params.get("src")) return "view.html?src=" + encodeURIComponent(params.get("src"));
        return "view.html?doc=" + encodeURIComponent(params.get("doc"));
      }

      // 포인터 — 30ms 스로틀, 캔버스 기준 0~1 비율 좌표
      var lastSent = 0;
      var pointerOn = false;
      function sendPointer(e) {
        if (!pointerEnabled || driver.kind === "html") return;
        var now = Date.now();
        if (now - lastSent < 30) return;
        lastSent = now;
        var rect = stage.getBoundingClientRect();
        if (!rect.width || !rect.height) return;
        var x = (e.clientX - rect.left) / rect.width;
        var y = (e.clientY - rect.top) / rect.height;
        if (x < 0 || x > 1 || y < 0 || y > 1) return;
        pointerOn = true;
        protocol.sendPointer(Math.round(x * 1000) / 1000, Math.round(y * 1000) / 1000, true);
      }

      function pointerOff() {
        if (!pointerOn) return;
        pointerOn = false;
        protocol.sendPointer(0, 0, false);
      }

      function start() {
        document.title = "발표 — " + driver.title + " - 마이가디언";
        document.getElementById("doc-title").textContent = driver.title;
        document.getElementById("mode-badge").textContent = driver.mode || "브리핑";
        document.getElementById("topbar").hidden = false;
        document.getElementById("main").hidden = false;

        transport = B.createBroadcastTransport(B.channelName(channelId));
        protocol = B.createProtocol(transport, {
          // 청중 창이 뒤늦게 열리면 현재 상태를 보내 맞춘다 (자료 내용은 채널에 싣지 않는다)
          hello: function () {
            protocol.sendState(current, videoState(), scrollRatio());
          }
        });

        if (driver.kind === "html") {
          // HTML 자료: 단일 문서 스크롤 동기화. 페이지 네비·포인터는 없다
          document.getElementById("nav").hidden = true;
          document.getElementById("next-panel").hidden = true;
          document.getElementById("hint").textContent =
            "HTML 자료는 스크롤이 청중 창에 동기화됩니다. 포인터·페이지 넘김은 이 형식에서 지원되지 않습니다.";
        } else {
          document.getElementById("nav").hidden = false;
          buildNav();
        }

        goTo(1);
        protocol.sendState(current, videoState(), scrollRatio());

        document.getElementById("open-view").addEventListener("click", function () {
          window.open(viewUrl(), "mg-brief-view-" + channelId);
          this.blur(); // 포커스가 버튼에 남으면 이후 키보드 넘김이 막힌다
        });

        var toggle = document.getElementById("pointer-toggle");
        if (driver.kind === "html") {
          toggle.hidden = true;
        } else {
          toggle.addEventListener("click", function () {
            pointerEnabled = !pointerEnabled;
            toggle.setAttribute("aria-pressed", String(pointerEnabled));
            if (!pointerEnabled) pointerOff();
          });
        }

        stageWrap.addEventListener("mousemove", sendPointer);
        stageWrap.addEventListener("mouseleave", pointerOff);
        stageWrap.addEventListener("click", function (e) {
          if (e.target.closest("video") || driver.kind === "html") return;
          goTo(current + 1);
        });

        document.addEventListener("keydown", function (e) {
          if (e.target.closest("input, select, textarea")) return;
          if (driver.kind === "html") return;
          // Space는 포커스된 버튼을 활성화해야 하므로(접근성) 버튼 위에서는 제외.
          // 화살표는 버튼에 포커스가 남아 있어도 페이지 넘김으로 처리한다
          var onButton = e.target.closest("button");
          if (e.key === "ArrowRight" || e.key === "PageDown" || (e.key === " " && !onButton)) {
            e.preventDefault();
            goTo(current + 1);
          } else if (e.key === "ArrowLeft" || e.key === "PageUp") {
            e.preventDefault();
            goTo(current - 1);
          }
        });

        var timer = document.getElementById("timer");
        setInterval(function () {
          var s = Math.floor((Date.now() - startedAt) / 1000);
          timer.textContent = Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
        }, 1000);
        timer.addEventListener("click", function () { startedAt = Date.now(); });

        window.addEventListener("resize", function () {
          B.scaleStage(stageWrap, stage);
          B.scaleStage(nextWrap, nextStage);
        });
        window.addEventListener("beforeunload", function () { transport.close(); });
      }

      function boot(recordPromise, chFrom) {
        recordPromise.then(function (record) {
          if (!record) throw new Error("발표할 자료가 없습니다. 진입 화면에서 자료를 열어주세요.");
          channelId = chFrom(record);
          return B.createDriver(record, { audience: false });
        }).then(function (d) {
          driver = d;
          start();
        }).catch(function (err) {
          fail(err && err.message ? err.message : String(err));
        });
      }

      if (isLocal) {
        boot(B.loadMaterial(), function (record) { return record.id; });
      } else if (params.get("src")) {
        boot(
          B.loadDocBySrc(params.get("src")).then(function (d) { return { kind: "doc", id: d.id, doc: d }; }),
          function (record) { return record.id; }
        );
      } else if (params.get("doc")) {
        boot(
          B.loadDocById(params.get("doc")).then(function (d) { return { kind: "doc", id: d.id, doc: d }; }),
          function (record) { return record.id; }
        );
      } else {
        fail("문서가 지정되지 않았습니다.");
      }
    })();
  </script>
</body>
</html>
