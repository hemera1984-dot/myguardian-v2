<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카톡카드 - 마이가디언</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="../assets/style.css">
  <script src="../assets/platform.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body class="simple">
  <header class="site-header">
    <div class="inner">
      <a href="../" class="site-title">마이<span class="accent">가디언</span></a>
      <span class="site-tagline">카톡카드</span>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">카톡카드 생성기</h1>
    <p class="page-desc">고객 정보와 보유보험 요약을 카드 이미지로 만듭니다. 입력한 내용은 이 브라우저 안에서만 처리되며 어디에도 전송·저장되지 않습니다.</p>

    <div class="section">
      <div class="kcard-form">
        <div>
          <label for="in-name">고객 표시명</label>
          <input type="text" id="in-name" placeholder="예: 김OO 고객님" value="고객님">
        </div>
        <div>
          <label for="in-sub">부제 (선택)</label>
          <input type="text" id="in-sub" placeholder="예: 2026년 7월 보장 점검">
        </div>
        <div>
          <label for="in-policies">보유보험 (한 줄에 하나, 상품명 | 월보험료)</label>
          <textarea id="in-policies" placeholder="예:
종신보험 | 120,000원
암보험 | 45,000원"></textarea>
        </div>
        <div>
          <label for="in-note">안내 문구 (선택)</label>
          <textarea id="in-note" placeholder="예: 보장 내용 궁금하신 점은 언제든 연락 주세요."></textarea>
        </div>
        <div>
          <label for="in-bg">카드 배경</label>
          <select id="in-bg">
            <option value="">단색 네이비</option>
            <option value="bg-frame">골드 프레임</option>
            <option value="bg-celebrate">축하 색종이</option>
          </select>
        </div>
      </div>

      <div class="kcard" id="kcard">
        <p class="k-kicker">보장 안내</p>
        <h2 class="k-name" id="k-name">고객님</h2>
        <p class="k-sub" id="k-sub" hidden></p>
        <div class="k-rule"></div>
        <p class="k-section" id="k-section" hidden>보유 보험</p>
        <ul class="k-list" id="k-list"></ul>
        <div class="k-total" id="k-total" hidden><span>월 보험료 합계</span><span class="p" id="k-total-val"></span></div>
        <p class="k-note" id="k-note" hidden></p>
        <div class="k-sign">
          <span class="who" id="k-who">안창민 FC</span>
          <span class="org" id="k-org">신한라이프 하랑지점</span>
        </div>
      </div>

      <p class="disclaimer" id="price-warn" hidden>금액 형식이 확인되지 않은 항목이 있어 월 보험료 합계를 표시하지 않습니다. 금액은 12,000원 형식으로 입력하세요.</p>
      <div class="kcard-actions">
        <button class="btn btn-primary" type="button" id="btn-download">이미지 저장</button>
      </div>
      <p class="disclaimer">카드 서명(이름·소속)은 케어센터 서재의 카톡 서명 설정을 함께 사용합니다.</p>
    </div>
  </main>

  <footer class="site-footer">
    마이가디언 v2
  </footer>

  <script>
    (function () {
      "use strict";
      var $ = function (id) { return document.getElementById(id); };

      var esc = window.mg.esc;

      // 케어센터와 같은 서명 설정 공유
      function loadSender() {
        try {
          var saved = JSON.parse(localStorage.getItem("mg_care_sender"));
          if (saved && saved["이름"]) return saved;
        } catch (e) {}
        return { "이름": "안창민 FC", "소속": "신한라이프 하랑지점" };
      }

      // 금액은 비음수 정수(콤마·원 허용)만 합산한다. 그 외 표기는 그대로 보여주되 합계에서 제외 (오계산 방지)
      function parsePolicies(text) {
        return text.split("\n").map(function (line) {
          var parts = line.split("|");
          var name = (parts[0] || "").trim();
          if (!name) return null;
          var price = (parts[1] || "").trim();
          var valid = /^[0-9]{1,3}(,[0-9]{3})*원?$|^[0-9]+원?$/.test(price);
          var num = valid ? Number(price.replace(/[^0-9]/g, "")) : 0;
          return { name: name, price: price, num: num, valid: valid };
        }).filter(Boolean);
      }

      function render() {
        var s = loadSender();
        $("k-who").textContent = s["이름"];
        $("k-org").textContent = s["소속"];
        $("k-name").textContent = $("in-name").value.trim() || "고객님";
        var sub = $("in-sub").value.trim();
        $("k-sub").hidden = !sub;
        $("k-sub").textContent = sub;
        var pols = parsePolicies($("in-policies").value);
        $("k-section").hidden = !pols.length;
        $("k-list").innerHTML = pols.map(function (p) {
          return "<li><span>" + esc(p.name) + "</span>" + (p.price ? '<span class="p">' + esc(p.price) + "</span>" : "") + "</li>";
        }).join("");
        var validPols = pols.filter(function (p) { return p.valid; });
        var invalidWithPrice = pols.filter(function (p) { return p.price && !p.valid; });
        var total = validPols.reduce(function (a, p) { return a + p.num; }, 0);
        // 합계는 전 항목의 금액이 확인될 때만 표시 — 일부만 합산한 값은 오해를 낳는다
        var showTotal = pols.length > 1 && total > 0 && invalidWithPrice.length === 0;
        $("k-total").hidden = !showTotal;
        if (showTotal) $("k-total-val").textContent = total.toLocaleString() + "원";
        $("price-warn").hidden = invalidWithPrice.length === 0;
        var note = $("in-note").value.trim();
        $("k-note").hidden = !note;
        $("k-note").textContent = note;
      }

      ["in-name", "in-sub", "in-policies", "in-note"].forEach(function (id) {
        $(id).addEventListener("input", render);
      });

      // 배경 선택 — 골드 프레임 / 축하 색종이
      $("in-bg").addEventListener("change", function () {
        var card = $("kcard");
        card.classList.remove("bg-frame", "bg-celebrate");
        if (this.value) card.classList.add(this.value);
      });
      render();

      $("btn-download").addEventListener("click", function () {
        var btn = this;
        btn.disabled = true;
        btn.textContent = "생성 중";
        html2canvas($("kcard"), { scale: 2, useCORS: true, backgroundColor: null }).then(function (canvas) {
          var a = document.createElement("a");
          var d = new Date();
          a.download = "카톡카드-" + d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0") + ".png";
          a.href = canvas.toDataURL("image/png");
          a.click();
          btn.disabled = false;
          btn.textContent = "이미지 저장";
        }).catch(function () {
          btn.disabled = false;
          btn.textContent = "생성 실패 - 다시 시도";
        });
      });
    })();
  </script>
</body>
</html>
