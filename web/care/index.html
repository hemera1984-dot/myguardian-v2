<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>케어센터 - 마이가디언</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="../assets/style.css">
  <script src="../assets/platform.js"></script>
</head>
<body class="simple">
  <header class="site-header">
    <div class="inner">
      <a href="../" class="site-title">마이<span class="accent">가디언</span></a>
      <span class="site-tagline">케어센터</span>
    </div>
  </header>

  <main class="container">
    <div class="photo-hero">
      <img src="../assets/img/hero-care.jpg" alt="" fetchpriority="high">
      <div class="photo-hero-text">
        <h1 class="serif">케어센터 서재</h1>
        <p>매주 월요일, 한 주를 여는 보험·경제 이야기. 발행된 모든 호를 언제든 꺼내 읽을 수 있습니다.</p>
      </div>
    </div>

    <div class="section">
      <div class="sender-row" id="sender-row">
        <span>카톡 서명</span>
        <input class="name" id="sender-name" type="text" aria-label="발신자 이름" placeholder="이름">
        <input class="org" id="sender-org" type="text" aria-label="소속 지점" placeholder="소속">
        <span id="sender-saved" hidden>저장됨</span>
      </div>

      <div class="compose-panel" id="compose" hidden>
        <h3 id="compose-title">카톡 문구</h3>
        <textarea id="compose-text" aria-label="카톡 발송 문구"></textarea>
        <div class="compose-actions">
          <button class="btn btn-primary" type="button" id="compose-copy">복사하기</button>
          <button class="btn" type="button" id="compose-close">닫기</button>
        </div>
      </div>

      <div class="latest-duo" id="latest-duo"></div>

      <div class="pill-tabs" role="tablist" aria-label="채널">
        <button type="button" class="active" data-ch="">전체</button>
        <button type="button" data-ch="주간">주간 안창민</button>
        <button type="button" data-ch="월간">월간 안창민</button>
      </div>

      <div class="shelf-grid" id="issue-list">
        <div class="placeholder-panel" style="grid-column:1/-1">발행물을 불러오는 중입니다.</div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    마이가디언 v2
  </footer>

  <script>
    (function () {
      "use strict";
      var ALL = [];
      var channel = "";
      var publisher = "";

      var esc = window.mg.esc;

      function issueUrl(issue) {
        return new URL("issue.html?id=" + encodeURIComponent(issue.id), window.location.href).href;
      }

      // 발신자 서명 — 지점이 바뀌면 여기서만 고친다 (localStorage 저장)
      var SENDER_KEY = "mg_care_sender";
      function loadSender() {
        try {
          var saved = JSON.parse(localStorage.getItem(SENDER_KEY));
          if (saved && saved["이름"]) return saved;
        } catch (e) {}
        return { "이름": "안창민 FC", "소속": "신한라이프 하랑지점" };
      }
      function saveSender(s) {
        localStorage.setItem(SENDER_KEY, JSON.stringify(s));
        var mark = document.getElementById("sender-saved");
        mark.hidden = false;
        clearTimeout(saveSender._t);
        saveSender._t = setTimeout(function () { mark.hidden = true; }, 1200);
      }

      // 주간 카테고리 → 카톡 표기 (v1 실사용 양식)
      var CAT_LABEL = { "시사": "정치/사회", "경제": "경제/상속", "교양": "지식/교양", "보험": "보험/건강" };
      var BAR = "─────────────";

      function kakaoText(issue) {
        var s = loadSender();
        var url = issueUrl(issue);
        var toc = issue["꼭지"] || [];
        var mag = "『" + issue["채널"] + " " + (issue["발행인"] || "안창민") + "』";
        var lines = ["안녕하세요, " + s["이름"] + "입니다.", ""];
        if (issue["채널"] === "주간") {
          lines.push("건강 유의하시고 좋은 한 주 보내세요.", "");
          lines.push(mag + " " + (issue["주차라벨"] || "") + " (통권 " + issue["호수"] + "호)");
          lines.push("이번 주 뉴스 브리핑이 발행되었습니다.", "");
          lines.push("[이번 주 주요 뉴스]", BAR);
          toc.forEach(function (t) {
            lines.push((CAT_LABEL[t["카테고리"]] || t["카테고리"]) + " | " + t["제목"]);
          });
          lines.push(BAR, "");
          if (toc.length) lines.push("이번 주 핵심: " + toc[0]["제목"], "");
        } else {
          lines.push("환절기 건강 잘 챙기고 계신가요?", "");
          lines.push(mag + " " + (issue["주차라벨"] || "") + "(통권 " + issue["호수"] + "호)가");
          lines.push("발행되었습니다.", "");
          lines.push("이번 호 주요 칼럼", BAR);
          toc.forEach(function (t, i) {
            lines.push((i + 1) + ". " + t["제목"]);
          });
          lines.push(BAR, "");
        }
        lines.push("아래 링크에서 바로 읽어보실 수 있습니다.");
        lines.push(url, "");
        lines.push("보험·절세·상속 관련 궁금한 점이 있으시면");
        lines.push("언제든 편하게 연락 주세요.", "");
        lines.push(s["이름"] + " | " + s["소속"]);
        return lines.join("\n");
      }

      function openCompose(issue) {
        var panel = document.getElementById("compose");
        document.getElementById("compose-title").textContent =
          "카톡 문구 — " + issue["채널"] + " " + (issue["발행인"] || "안창민") + " " + issue["호수"] + "호 (수정 후 복사하세요)";
        document.getElementById("compose-text").value = kakaoText(issue);
        panel.hidden = false;
        panel.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      var copyText = window.mg.copy;

      function render() {
        var box = document.getElementById("issue-list");
        var list = ALL.filter(function (i) {
          if (channel && i["채널"] !== channel) return false;
          if (publisher && (i["발행인"] || "안창민") !== publisher) return false;
          return true;
        }).sort(function (a, b) { return (b["발행일"] || "") < (a["발행일"] || "") ? -1 : 1; });
        if (!list.length) {
          box.innerHTML = '<div class="placeholder-panel" style="grid-column:1/-1">아직 발행물이 없습니다. 첫 호가 준비되는 대로 서재에 꽂힙니다.</div>';
          return;
        }
        box.innerHTML = list.map(function (i, idx) {
          var href = "issue.html?id=" + encodeURIComponent(i.id);
          var pub = i["발행인"] || "안창민";
          var cover = i["커버이미지"]
            ? '<span class="shelf-cover"><img src="../../' + esc(i["커버이미지"]) + '" alt="" loading="lazy">'
              + '<span class="shelf-band"><span class="vol">' + esc(i["호수"]) + '호</span><span class="ch">' + esc(i["채널"]) + " " + esc(pub) + "</span></span></span>"
            : '<span class="shelf-cover no-img ch-' + esc(i["채널"]) + '">' + esc(i["채널"]) + " " + esc(pub) + "</span>";
          return '<article class="shelf-item">'
            + '<a href="' + href + '">' + cover + "</a>"
            + '<div class="shelf-label">' + esc(i["주차라벨"] || i["발행일"]) + "</div>"
            + '<a class="shelf-title" href="' + href + '">' + esc(i["제목"]) + "</a>"
            + '<button class="shelf-kakao" type="button" data-idx="' + idx + '">카톡 문구</button>'
            + "</article>";
        }).join("");
        box.querySelectorAll("button[data-idx]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            openCompose(list[Number(btn.dataset.idx)]);
          });
        });
      }

      // 서명 입력 초기화·저장
      (function () {
        var s = loadSender();
        var nameInput = document.getElementById("sender-name");
        var orgInput = document.getElementById("sender-org");
        nameInput.value = s["이름"];
        orgInput.value = s["소속"];
        function onChange() {
          saveSender({ "이름": nameInput.value.trim(), "소속": orgInput.value.trim() });
        }
        nameInput.addEventListener("input", onChange);
        orgInput.addEventListener("input", onChange);
      })();

      document.getElementById("compose-copy").addEventListener("click", function () {
        copyText(document.getElementById("compose-text").value, this);
      });
      document.getElementById("compose-close").addEventListener("click", function () {
        document.getElementById("compose").hidden = true;
      });

      fetch("../../data/care/issues.json")
        .then(function (r) { return r.json(); })
        .then(function (data) {
          ALL = Array.isArray(data) ? data : (data.data || []);
          buildPublisherTabs();
          buildLatestDuo();
          render();
        })
        .catch(function () {
          document.getElementById("issue-list").innerHTML =
            '<div class="placeholder-panel">발행물을 불러오지 못했습니다.</div>';
        });

      var channelTabs = document.querySelector(".pill-tabs");
      channelTabs.querySelectorAll("button").forEach(function (btn) {
        btn.addEventListener("click", function () {
          channelTabs.querySelectorAll("button").forEach(function (b) {
            b.classList.toggle("active", b === btn);
          });
          channel = btn.dataset.ch;
          render();
        });
      });

      // 채널별 최신호 직행 배너 — 서재를 뒤지지 않고 바로 읽는다
      function buildLatestDuo() {
        var duo = document.getElementById("latest-duo");
        var html = ["주간", "월간"].map(function (ch) {
          var list = ALL.filter(function (i) { return i["채널"] === ch; })
            .sort(function (a, b) { return (b["발행일"] || "") < (a["발행일"] || "") ? -1 : 1; });
          if (!list.length) return "";
          var i = list[0];
          var bg = i["커버이미지"] ? ' style="background-image:url(../../' + esc(i["커버이미지"]) + ')"' : "";
          return '<a class="latest-card" href="issue.html?id=' + encodeURIComponent(i.id) + '">'
            + '<span class="latest-bg"' + bg + "></span>"
            + '<span class="latest-body"><span class="latest-ch">' + esc(ch) + " " + esc(i["발행인"] || "안창민") + " · " + esc(i["호수"]) + "호</span>"
            + '<span class="latest-title serif">' + esc(i["제목"]) + "</span>"
            + '<span class="latest-go">최신호 바로 읽기</span></span></a>';
        }).join("");
        duo.innerHTML = html;
      }

      // 발행인이 2명 이상일 때만 발행인 필터를 노출한다
      function buildPublisherTabs() {
        var pubs = [];
        ALL.forEach(function (i) {
          var p = i["발행인"] || "안창민";
          if (pubs.indexOf(p) < 0) pubs.push(p);
        });
        if (pubs.length < 2) return;
        var row = document.createElement("div");
        row.className = "pill-tabs";
        row.setAttribute("aria-label", "발행인");
        row.innerHTML = '<button type="button" class="active" data-pub="">전체 발행인</button>'
          + pubs.map(function (p) {
              return '<button type="button" data-pub="' + esc(p) + '">' + esc(p) + " FC</button>";
            }).join("");
        channelTabs.parentNode.insertBefore(row, channelTabs.nextSibling);
        row.querySelectorAll("button").forEach(function (btn) {
          btn.addEventListener("click", function () {
            row.querySelectorAll("button").forEach(function (b) {
              b.classList.toggle("active", b === btn);
            });
            publisher = btn.dataset.pub;
            render();
          });
        });
      }
    })();
  </script>
</body>
</html>
