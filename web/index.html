<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이가디언</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <a class="sidebar-brand" href="./">마이<span class="accent">가디언</span></a>
    <nav class="sidebar-nav">
      <a href="./" class="active">홈</a>
      <a href="claims/">청구·지급</a>
      <a href="cases/">사례·판례</a>
      <a href="learn/">학습</a>
      <a href="care/">케어센터</a>
      <a href="card/">카톡카드</a>
    </nav>
    <p class="sidebar-foot">보험 업무 플랫폼</p>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="main-area">
    <header class="topbar">
      <button class="menu-toggle" id="menu-toggle" aria-label="메뉴 열기">
        <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="site-title">마이<span class="accent">가디언</span></span>
    </header>

    <main class="container">
      <section class="section">
        <div class="search-wrap">
          <span class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21"/></svg></span>
          <input class="search-bar" type="search" placeholder="사례·용어·케이스카드 통합 검색 (준비중)" aria-label="통합 검색">
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">업무 메뉴</h2>
        <nav class="menu-grid">
          <a class="menu-card" href="claims/">
            <span class="name">청구·지급</span>
            <span class="desc">지급사례 검색, 알릴의무 셀프체크, 서류 가이드</span>
          </a>
          <a class="menu-card" href="cases/">
            <span class="name">사례·판례</span>
            <span class="desc">분쟁사례·판례 검색과 필터</span>
          </a>
          <a class="menu-card" href="learn/">
            <span class="name">학습</span>
            <span class="desc">학습 콘텐츠, 용어·질병 사전</span>
          </a>
          <a class="menu-card" href="care/">
            <span class="name">케어센터</span>
            <span class="desc">주간·월간 안창민 아카이브</span>
          </a>
          <a class="menu-card" href="card/">
            <span class="name">카톡카드</span>
            <span class="desc">고객 발송용 카드 이미지 생성</span>
          </a>
        </nav>
      </section>

      <section class="section">
        <h2 class="section-title">팀 캘린더</h2>
        <div class="placeholder-panel" id="team-calendar">
          팀 캘린더가 연결될 자리입니다.
          <!-- 추후 iframe 연결: <iframe src="" height="480" title="팀 캘린더"></iframe> -->
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">케어센터 최신호</h2>
        <div class="placeholder-panel" id="care-latest">
          케어센터 최신호가 표시될 자리입니다.
        </div>
      </section>
    </main>

    <footer class="site-footer">
      마이가디언 v2
    </footer>
  </div>

  <script>
    (function () {
      var toggle = document.getElementById("menu-toggle");
      var sidebar = document.getElementById("sidebar");
      var overlay = document.getElementById("sidebar-overlay");
      toggle.addEventListener("click", function () {
        sidebar.classList.toggle("open");
        overlay.classList.toggle("show");
      });
      overlay.addEventListener("click", function () {
        sidebar.classList.remove("open");
        overlay.classList.remove("show");
      });
    })();
  </script>
</body>
</html>
