<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <title>마이가디언</title>
  <meta name="theme-color" content="#0a1d37">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: "Pretendard", "Pretendard Variable", sans-serif;
      background: #0a1d37;
      color: #fff;
      overflow: hidden;
      word-break: keep-all;
      -webkit-font-smoothing: antialiased;
    }

    /* 조용히 흐르는 배경 (영상 대신) */
    .bg { position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(1100px 640px at 70% 20%, rgba(0,166,199,0.16), transparent 60%),
        radial-gradient(950px 760px at 22% 92%, rgba(7,88,214,0.22), transparent 60%),
        linear-gradient(160deg, #0a1d37, #102a4e 55%, #0a1d37);
    }
    .bg::after { content:""; position:absolute; inset:0;
      background: linear-gradient(115deg, transparent 45%, rgba(255,255,255,0.045) 50%, transparent 55%);
      transform: translateX(-50%); animation: sweep 11s ease-in-out infinite; }
    @keyframes sweep { 0%,100%{transform:translateX(-50%)} 50%{transform:translateX(50%)} }

    .top { position: absolute; top: 26px; left:0; right:0; z-index:3;
      display:flex; justify-content:center; align-items:center; gap:9px;
      opacity:0; animation: fade 0.8s ease 0.2s forwards; }
    .top img { width:26px; height:26px; display:block; }
    .top span { font-size:13px; font-weight:700; letter-spacing:0.02em; color:rgba(255,255,255,0.7); }

    .page { position:relative; z-index:2; height:100%;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:38px; padding:32px; }

    /* 키네틱 타이포 무대 */
    .type { text-align:center; min-height: 34vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .line { opacity:0; }
    .kicker { font-size: clamp(14px,2.4vw,18px); font-weight:600; letter-spacing:0.06em;
      color:#43c8df; animation: rise 0.7s ease 0.5s forwards; }
    .title { font-size: clamp(44px,9vw,88px); font-weight:800; letter-spacing:-0.03em; line-height:1.05;
      margin: 10px 0 4px; animation: rise 0.8s ease 0.9s forwards; }
    .desc { font-size: clamp(16px,3vw,24px); font-weight:500; color:rgba(255,255,255,0.82);
      overflow:hidden; }
    .desc .seg { display:inline-block; opacity:0; transform: translateY(12px); }
    .desc .seg.a { animation: rise 0.6s ease 1.6s forwards; }
    .desc .seg.b { animation: rise 0.6s ease 2.1s forwards; }
    .desc .dot { color:#43c8df; margin:0 2px; }

    @keyframes rise { from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none} }
    @keyframes fade { to{opacity:1} }

    .actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
      opacity:0; animation: rise 0.7s ease 2.7s forwards; }
    .btn { display:inline-flex; align-items:center; gap:10px; height:52px; padding:0 26px;
      border-radius:8px; font:inherit; font-size:15px; font-weight:700; cursor:pointer;
      border:1px solid transparent; text-decoration:none;
      transition: background-color 0.16s ease, border-color 0.16s ease; }
    .btn-google { background:#fff; color:#1f2937; }
    .btn-google:hover { background:#f1f3f5; }
    .btn-enter { background:#0758d6; color:#fff; }
    .btn-enter:hover { background:#0648ad; }
    .btn-ghost { background:transparent; color:rgba(255,255,255,0.78); border-color:rgba(255,255,255,0.25); }
    .btn-ghost:hover { border-color:rgba(255,255,255,0.5); color:#fff; }
    .btn svg { width:18px; height:18px; }

    @media (max-width:640px) {
      .actions { flex-direction:column; align-items:stretch; width:min(100%,320px); }
      .btn { justify-content:center; width:100%; }
    }
    @media (prefers-reduced-motion: reduce) {
      .bg::after { animation:none; }
      .line, .top, .actions, .desc .seg { animation:none !important; opacity:1 !important; transform:none !important; }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="top"><img src="assets/logo.svg" alt=""><span>마이가디언</span></div>

  <main class="page">
    <div class="type">
      <p class="line kicker">설계사를 위한</p>
      <h1 class="line title">마이가디언</h1>
      <p class="line desc"><span class="seg a">고객관리부터</span> <span class="seg b">팀원관리까지<span class="dot">.</span></span></p>
    </div>

    <div class="actions" id="actions"><!-- 상태에 따라 채워짐 --></div>
  </main>

  <script>
    (function () {
      "use strict";
      // 로그인 상태 placeholder — 2차 공사에서 구글 OAuth 세션 검증으로 교체.
      var KEY = "mg_signed_in";
      var signedIn = false;
      try { signedIn = localStorage.getItem(KEY) === "1"; } catch (e) {}
      var actions = document.getElementById("actions");

      var G = '<svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.6 2.6 30.2 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.8 6.1C12.2 13.3 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.4c-.5 2.9-2.2 5.3-4.7 7l7.3 5.7c4.3-3.9 6.8-9.7 6.8-16.2z"/><path fill="#FBBC05" d="M10.3 28.6c-.5-1.4-.8-2.9-.8-4.6s.3-3.2.8-4.6l-7.8-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.3-5.7c-2 1.4-4.7 2.3-7.9 2.3-6.4 0-11.8-3.8-13.7-9.4l-7.8 6.1C6.4 42.6 14.6 48 24 48z"/></svg>';

      if (signedIn) {
        actions.innerHTML =
          '<a class="btn btn-enter" href="index.html">메인으로 들어가기</a>'
          + '<button class="btn btn-ghost" type="button" id="switch">다른 계정으로</button>';
        document.getElementById("switch").addEventListener("click", function () {
          try { localStorage.removeItem(KEY); } catch (e) {}
          location.reload();
        });
      } else {
        actions.innerHTML = '<button class="btn btn-google" type="button" id="google">' + G + "Google 계정으로 로그인</button>";
        document.getElementById("google").addEventListener("click", function () {
          try { localStorage.setItem(KEY, "1"); } catch (e) {}
          location.href = "index.html";
        });
      }
    })();
  </script>
</body>
</html>
